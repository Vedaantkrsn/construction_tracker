{% extends 'base.html' %}
{% block content %}
<div class="container-fluid px-4 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>📝 Add Daily Log</h2>
        <a href="{% url 'site_detail' site.pk %}" class="btn btn-success">
            ← Back
        </a>
    </div>
    <div class="card add-logdetail-block">
        <div class="card-header site-header">
            <h4 class="mb-0">Daily Log Details</h4>
        </div>
        <div class="card-body log-detail-body p-4">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="mt-4">
                    <button type="submit" class="btn site-btn">
                        💾 Save Log
                    </button>
                    <a href="javascript:history.back()"
                       class="btn btn-success ms-2">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
