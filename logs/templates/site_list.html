{% extends 'base.html' %}

{% block content %}
<h1> All Sites </h1>
<h2> Construction Sites </h2>
<ul>
    {% for site in sites %}
        <li> <a href="{% url 'site_detail' site.pk %}"> {{ site.name}} </a> - {{ site.location }}</li>
    {% endfor %}
</ul>
<a href="{% url 'add_site' %}">Add Site</a>

{% endblock %}
