{% extends 'base.html' %}

{% block content %}

<div class="container py-4">

    <h2 class="mb-4">
        <i class="bi bi-qr-code-scan"></i>
        QR Attendance
    </h2>

    <div class="row">

        {% for site in assigned_sites %}

        <div class="col-md-4 mb-4">

            <div class="card shadow-sm h-100">

                <div class="card-body">

                    <h5>{{ site.name }}</h5>

                    <p class="text-muted">
                        <i class="bi bi-geo-alt"></i>
                        {{ site.location }}
                    </p>

                    {% if site.active_qr_code %}

                        <a href="{% url 'qr_check_in' site.active_qr_code.token %}"
                           class="btn btn-warning w-100">
                            <i class="bi bi-box-arrow-in-right"></i>
                            Open Attendance
                        </a>

                    {% else %}

                        <button class="btn btn-secondary w-100" disabled>
                            No Active QR
                        </button>

                    {% endif %}

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12">

            <div class="alert alert-info">

                You have not been assigned to any sites.

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
